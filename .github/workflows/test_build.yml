name: Test Build (PRs)

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Copy tsanyal_resume.ts to src/data/cv.ts
        run: mkdir -p src/data && cp resume/tsanyal_resume.ts src/data/cv.ts
      - name: Build
        run: npm run build
        env:
          SITE_URL: https://tanmoy7989.github.io
